<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickSlots</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ╔══════════════════════════════════════════╗
       ║  HEADER                                  ║
       ╚══════════════════════════════════════════╝ -->
  <header class="header">
    <div class="header-brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-name">QuickSlots</span>
      <span class="sync-status" id="sync-status" title="Storage mode">
        <span class="sync-status-ico" id="sync-status-ico">☁</span>
        <span id="sync-status-text">Synced</span>
      </span>
    </div>
    <button class="btn-clear-all" id="btn-clear-all" title="Clear all slots">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
      Clear All
    </button>
  </header>

  <!-- ╔══════════════════════════════════════════╗
       ║  SHORTCUT HINT                           ║
       ╚══════════════════════════════════════════╝ -->
  <div class="hint-bar">
    <span><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>1–4</kbd> Save</span>
    <span class="dot">·</span>
    <span><kbd>Alt</kbd><kbd>Shift</kbd><kbd>1–4</kbd> Paste</span>
  </div>

  <!-- ╔══════════════════════════════════════════╗
       ║  SEARCH                                  ║
       ╚══════════════════════════════════════════╝ -->
  <div class="search-row">
    <div class="search-wrap">
      <svg class="search-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="text" placeholder="Search slots &amp; history…" autocomplete="off" spellcheck="false" />
      <button class="search-x" id="search-x" title="Clear" hidden>✕</button>
    </div>
  </div>

  <!-- ╔══════════════════════════════════════════╗
       ║  SCROLLABLE BODY                         ║
       ╚══════════════════════════════════════════╝ -->
  <div class="body-scroll">

    <!-- ── SLOT LIST ── -->
    <main id="slot-list" class="slot-list">
      <!-- rendered by popup.js -->
    </main>

    <!-- ── RECENT HISTORY ── -->
    <section class="history-section" id="history-section">
      <div class="history-head">
        <h2 class="history-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 3"/>
          </svg>
          Recent History
        </h2>
        <button class="btn-clear-history" id="btn-clear-history" title="Clear all history">
          Clear History
        </button>
      </div>
      <div id="history-list" class="history-list">
        <!-- rendered by popup.js -->
      </div>
    </section>

    <!-- ── SETTINGS ── -->
    <section class="settings-section" id="settings-section">
      <div class="settings-head">
        <h2 class="settings-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </h2>
      </div>

      <div class="settings-body">
        <div class="setting-row">
          <div class="setting-label-group">
            <span class="setting-label">☁ Storage Mode</span>
            <span class="setting-sub">Choose how your slots &amp; history are stored.</span>
          </div>
        </div>

        <label class="radio-row" for="mode-sync">
          <input type="radio" name="storage-mode" id="mode-sync" value="sync" checked />
          <span class="radio-dot"></span>
          <span class="radio-text">
            <span class="radio-title">Sync Across Devices</span>
            <span class="radio-desc">Uses your Google account to sync between computers.</span>
          </span>
        </label>

        <label class="radio-row" for="mode-local">
          <input type="radio" name="storage-mode" id="mode-local" value="local" />
          <span class="radio-dot"></span>
          <span class="radio-text">
            <span class="radio-title">Local Device Only</span>
            <span class="radio-desc">Keeps data only on this device, never synced.</span>
          </span>
        </label>
      </div>
    </section>

  </div>

  <!-- ╔══════════════════════════════════════════╗
       ║  EDIT MODAL                              ║
       ╚══════════════════════════════════════════╝ -->
  <div class="overlay" id="overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 class="modal-title">Edit Slot <span id="modal-num"></span></h2>
        <button class="modal-close" id="modal-close" title="Close">✕</button>
      </div>
      <textarea id="modal-ta" class="modal-ta" placeholder="Type or paste your text here…" spellcheck="false"></textarea>
      <div class="modal-meta">
        <span id="modal-chars">0</span> characters
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- ╔══════════════════════════════════════════╗
       ║  TOAST                                   ║
       ╚══════════════════════════════════════════╝ -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="popup.js"></script>
</body>
</html>
